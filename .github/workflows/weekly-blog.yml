name: Weekly Automated Blog Generator

on:
  schedule:
    # Runs at 00:00 every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.actor == 'Ashaz11223344'
    permissions:
      contents: write # Crucial: Allows Action to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama, Pull Model, and Run Generator
        env:
          OLLAMA_HOST: 'http://localhost:11434'
          OLLAMA_MODEL: 'llama3.2'
        shell: bash
        run: |
          # Start Ollama server in background
          ollama serve > ollama.log 2>&1 &
          
          # Wait for Ollama server to start
          echo "⏳ Waiting for Ollama to start..."
          count=0
          while ! curl -s http://localhost:11434 > /dev/null; do
            if [ $count -ge 30 ]; then
              echo "❌ Timeout waiting for Ollama to start"
              cat ollama.log
              exit 1
            fi
            sleep 2
            count=$((count + 1))
          done
          echo "✅ Ollama server is up and running!"
          
          # Pull the model (Llama 3.2 is ~2.0GB, much lighter and faster than Mistral 7B)
          echo "📥 Pulling model $OLLAMA_MODEL..."
          ollama pull $OLLAMA_MODEL
          echo "✅ Model $OLLAMA_MODEL pulled successfully!"
          
          # Run the script
          echo "🚀 Running blog generator script..."
          node scripts/generate-blog.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any new MDX files or changes to topics
          if [ -n "$(git status --porcelain)" ]; then
            git add content/blog/*.mdx content/blog-topics.json
            git commit -m "chore(blog): auto-publish weekly article [skip ci]"
            git push origin main
            echo "🚀 New article pushed to repository!"
          else
            echo "ℹ️ No changes detected. Skipping commit."
          fi
